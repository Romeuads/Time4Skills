<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time4Skills – Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <style>
    .chat-page { display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--white); }
    .chat-trades { display:flex;gap:8px;padding:10px 16px;overflow-x:auto;border-bottom:1px solid var(--border);scrollbar-width:none; }
    .chat-trades::-webkit-scrollbar { display:none; }
    .trade-tab { white-space:nowrap;padding:6px 12px;border-radius:99px;border:1.5px solid var(--border);background:var(--white);font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--text-mid);cursor:pointer;transition:all .15s; }
    .trade-tab.active { background:var(--teal);border-color:var(--teal);color:#fff; }
    .messages { flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px; }
    .bubble { display:flex;align-items:flex-end;gap:8px; }
    .bubble-mine  { flex-direction:row-reverse; }
    .bubble-text-mine   { background:var(--teal);color:#fff;padding:10px 14px;border-radius:18px 18px 4px 18px;font-size:14px;max-width:72%; }
    .bubble-text-theirs { background:var(--gray-card);color:var(--text-dark);padding:10px 14px;border-radius:18px 18px 18px 4px;font-size:14px;max-width:72%;border:1px solid var(--border); }
    .input-row { display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);background:var(--white); }
    .msg-input { flex:1;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;outline:none; }
    .msg-input:focus { border-color:var(--teal); }
    .send-btn { width:44px;height:44px;border-radius:12px;background:var(--teal);border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s; }
    .send-btn:hover { background:var(--teal-dark); }
    .send-btn svg { width:18px;height:18px; }
    .no-trades { flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text-light);font-size:14px;font-weight:600; }
  </style>
</head>
<body>
<div class="chat-page">
  <div id="topbar"></div>
  <div id="chat-body" style="display:flex;flex-direction:column;flex:1;overflow:hidden;"></div>
</div>

<script type="module">
  import { supabase } from '../js/supabase.js'
  import { requireAuth, topbarHTML, avatarHTML } from '../js/utils.js'

  const { data: { session } } = await supabase.auth.getSession()
  const user = session?.user
  if (!user) { window.location.href = 'index.html' }
  document.getElementById('topbar').innerHTML = topbarHTML({ back: 'trades.html', title: 'Mensagens', showIcons: false })

  const urlParams    = new URLSearchParams(window.location.search)
  let activeTrade    = urlParams.get('trade') || null
  let trades         = []
  let subscription   = null

  // Load user's active trades
  const { data } = await supabase
    .from('trades')
    .select('*, services(title), requester:profiles!trades_requester_id_fkey(name), provider:profiles!trades_provider_id_fkey(name)')
    .or(`requester_id.eq.${user.id},provider_id.eq.${user.id}`)
    .in('status', ['accepted','in_progress'])
  trades = data || []
  if (!activeTrade && trades.length) activeTrade = trades[0].id

  if (!trades.length) {
    document.getElementById('chat-body').innerHTML = `<div class="no-trades"><svg viewBox="0 0 24 24" fill="none" stroke="var(--text-light)" stroke-width="2" style="width:48px;height:48px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Nenhuma troca ativa para conversar.</div>`
  } else {
    renderChatUI()
    if (activeTrade) loadMessages(activeTrade)
  }

  function renderChatUI() {
    document.getElementById('chat-body').innerHTML = `
      ${trades.length > 1 ? `<div class="chat-trades" id="trade-tabs">${trades.map(t=>`<button class="trade-tab ${t.id===activeTrade?'active':''}" data-id="${t.id}">${t.services?.title||'Troca'}</button>`).join('')}</div>` : ''}
      <div class="messages" id="messages"></div>
      <div class="input-row">
        <input class="msg-input" id="msg-input" placeholder="Mensagem..." autocomplete="off">
        <button class="send-btn" id="send-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
      </div>`

    document.querySelectorAll('.trade-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTrade = btn.dataset.id
        document.querySelectorAll('.trade-tab').forEach(b => b.classList.remove('active'))
        btn.classList.add('active')
        loadMessages(activeTrade)
      })
    })

    document.getElementById('send-btn').addEventListener('click', sendMsg)
    document.getElementById('msg-input').addEventListener('keydown', e => { if (e.key==='Enter') sendMsg() })
  }

  async function loadMessages(tradeId) {
    if (subscription) supabase.removeChannel(subscription)
    document.getElementById('messages').innerHTML = '<div class="spinner"></div>'
    const { data } = await supabase
      .from('messages')
      .select('*, sender:profiles!messages_sender_id_fkey(name,avatar_url)')
      .eq('trade_id', tradeId)
      .order('created_at')
    renderMessages(data||[])
    subscription = supabase.channel('msgs-'+tradeId)
      .on('postgres_changes', { event:'INSERT', schema:'public', table:'messages', filter:`trade_id=eq.${tradeId}` },
        async payload => {
          const { data: msg } = await supabase.from('messages').select('*, sender:profiles!messages_sender_id_fkey(name,avatar_url)').eq('id', payload.new.id).single()
          appendMessage(msg)
        }
      ).subscribe()
  }

  function renderMessages(msgs) {
    const el = document.getElementById('messages')
    el.innerHTML = msgs.map(m => msgHTML(m)).join('')
    el.scrollTop = el.scrollHeight
  }

  function appendMessage(msg) {
    const el = document.getElementById('messages')
    el.insertAdjacentHTML('beforeend', msgHTML(msg))
    el.scrollTop = el.scrollHeight
  }

  function msgHTML(m) {
    const mine = m.sender_id === user.id
    return `<div class="bubble ${mine?'bubble-mine':''}">
      ${!mine ? avatarHTML(m.sender?.name||'?', 28, m.sender?.avatar_url) : ''}
      <div class="${mine?'bubble-text-mine':'bubble-text-theirs'}">${m.content}</div>
    </div>`
  }

  async function sendMsg() {
    const input = document.getElementById('msg-input')
    const text  = input.value.trim()
    if (!text || !activeTrade) return
    input.value = ''
    await supabase.from('messages').insert({ trade_id: activeTrade, sender_id: user.id, content: text })
  }
</script>
</body>
</html>
