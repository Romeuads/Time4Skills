<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time4Skills – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body { background: var(--white); }
    .auth-page { min-height: 100vh; display: flex; flex-direction: column; max-width: 480px; margin: 0 auto; }
    .auth-hero {
      background: linear-gradient(135deg, var(--blue-dark) 0%, var(--teal) 100%);
      padding: 52px 24px 44px;
    }
    .auth-logo { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .auth-logo-icon {
      width: 48px; height: 48px;
      background: rgba(255,255,255,.15);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-logo-icon svg { width: 28px; height: 28px; }
    .auth-brand { font-size: 20px; font-weight: 900; color: #fff; line-height: 1.1; }
    .auth-brand-sub { font-size: 12px; font-weight: 600; color: rgba(255,255,255,.7); }
    .auth-hero-text { font-size: 22px; font-weight: 800; color: #fff; line-height: 1.3; }
    .auth-card {
      flex: 1;
      background: var(--white);
      border-radius: 28px 28px 0 0;
      margin-top: -20px;
      padding: 28px 24px 32px;
      box-shadow: 0 -4px 24px rgba(0,0,0,.06);
    }
    .auth-card-title { font-size: 18px; font-weight: 800; color: var(--text-dark); margin-bottom: 20px; }
    .auth-form { display: flex; flex-direction: column; gap: 16px; }
    .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text-light); font-weight: 600; }
    .auth-footer a { color: var(--teal); font-weight: 800; text-decoration: none; }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-hero">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 3C9 3 6.5 5 6 8C4 8.5 2.5 10.2 2.5 12.3C2.5 14.8 4.5 16.8 7 16.8H17.5C19.4 16.8 21 15.2 21 13.3C21 11.6 19.8 10.2 18.2 9.8C18.1 6 15.4 3 12 3Z" fill="white"/><path d="M9 13L11 15L15 11" stroke="#2BAF8A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <div>
        <div class="auth-brand">Time4Skills</div>
        <div class="auth-brand-sub">Acadêmico</div>
      </div>
    </div>
    <p class="auth-hero-text">Troque conhecimento,<br>construa o futuro.</p>
  </div>

  <div class="auth-card">
    <h2 class="auth-card-title">Entrar na plataforma</h2>
    <form class="auth-form" id="login-form" novalidate>
      <div class="field">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <span class="icon-left"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input type="email" id="email" class="has-icon-left" placeholder="seu@email.com" autocomplete="email">
        </div>
        <span class="error-msg hidden" id="email-err"></span>
      </div>
      <div class="field">
        <label for="password">Senha</label>
        <div class="input-wrap">
          <span class="icon-left"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" id="password" class="has-icon-left has-icon-right" placeholder="••••••••" autocomplete="current-password">
          <span class="icon-right" id="toggle-pw">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
        </div>
        <span class="error-msg hidden" id="pw-err"></span>
      </div>
      <button type="submit" class="btn btn-primary btn-lg btn-full" id="login-btn">Entrar</button>
    </form>
    <p class="auth-footer">Não tem conta? <a href="register.html">Cadastre-se</a></p>
  </div>
</div>

<script type="module">
  import { supabase } from '../js/supabase.js'
  import { toast } from '../js/utils.js'

  // Redirect if already logged in
  const { data: { session } } = await supabase.auth.getSession()
  if (session) window.location.href = 'dashboard.html'

  const form    = document.getElementById('login-form')
  const btn     = document.getElementById('login-btn')
  const togglePw = document.getElementById('toggle-pw')
  const pwInput  = document.getElementById('password')

  togglePw.addEventListener('click', () => {
    pwInput.type = pwInput.type === 'password' ? 'text' : 'password'
  })

  function showErr(id, msg) {
    const el = document.getElementById(id)
    el.textContent = msg; el.classList.remove('hidden')
    document.getElementById(id.replace('-err','')).classList.add('error')
  }
  function clearErrs() {
    document.querySelectorAll('.error-msg').forEach(e => e.classList.add('hidden'))
    document.querySelectorAll('input.error').forEach(e => e.classList.remove('error'))
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault()
    clearErrs()
    const email    = document.getElementById('email').value.trim()
    const password = pwInput.value
    let valid = true
    if (!email)    { showErr('email-err', 'Informe o e-mail'); valid = false }
    if (!password) { showErr('pw-err', 'Informe a senha'); valid = false }
    if (!valid) return

    btn.classList.add('btn-loading')
    btn.disabled = true
    try {
      const { error } = await supabase.auth.signInWithPassword({ email, password })
      if (error) throw error
      window.location.href = 'dashboard.html'
    } catch {
      toast('E-mail ou senha inválidos', 'error')
    } finally {
      btn.classList.remove('btn-loading')
      btn.disabled = false
    }
  })
</script>
</body>
</html>
