<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time4Skills – Ranking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/global.css">
  <style>
    .rank-hero { background:linear-gradient(135deg,#92400E,#D97706);padding:20px;display:flex;align-items:center;gap:14px; }
    .rank-hero svg { width:28px;height:28px;color:#F5A623;flex-shrink:0; }
    .rank-hero-title { font-size:16px;font-weight:800;color:#fff; }
    .rank-hero-sub   { font-size:12px;color:rgba(255,255,255,.75);margin-top:1px; }
    .rank-list { display:flex;flex-direction:column;padding:12px 16px;gap:8px; }
    .rank-item { display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--radius-md);border:1.5px solid var(--border);background:var(--white); }
    .rank-item.top { border-color:var(--yellow);background:var(--yellow-light); }
    .rank-pos  { font-size:20px;width:32px;text-align:center;flex-shrink:0; }
    .rank-info { flex:1;min-width:0; }
    .rank-name   { font-size:14px;font-weight:700;color:var(--text-dark); }
    .rank-course { font-size:11px;color:var(--text-light);margin:1px 0 3px; }
    .rank-score  { font-size:18px;font-weight:900;color:var(--teal);text-align:right;flex-shrink:0; }
    .rank-score-lbl { font-size:10px;color:var(--text-light);font-weight:600;text-align:right; }
  </style>
</head>
<body>
<div class="app-shell">
  <div id="topbar"></div>
  <div class="page-content">
    <div class="rank-hero">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
      <div>
        <p class="rank-hero-title">Top Colaboradores</p>
        <p class="rank-hero-sub">Estudantes mais ativos da plataforma</p>
      </div>
    </div>
    <div id="rank-list"><div class="spinner"></div></div>
  </div>
  <div id="bottom-nav"></div>
</div>
<script type="module">
  import { supabase } from '../js/supabase.js'
  import { requireAuth, navHTML, topbarHTML, avatarHTML, starsHTML } from '../js/utils.js'

  await requireAuth(supabase)
  document.getElementById('topbar').innerHTML = topbarHTML()
  document.getElementById('bottom-nav').innerHTML = navHTML('ranking')

  const { data } = await supabase.from('profiles')
    .select('id,name,course,avatar_url,rating,balance,trades_done')
    .order('rating', { ascending: false })
    .limit(20)

  const medals = ['🥇','🥈','🥉']
  const users  = data || []

  document.getElementById('rank-list').innerHTML = users.length
    ? `<div class="rank-list">${users.map((u,i) => `
      <div class="rank-item animate-in ${i<3?'top':''}">
        <span class="rank-pos">${medals[i]||`${i+1}º`}</span>
        ${avatarHTML(u.name||'?', 44, u.avatar_url)}
        <div class="rank-info">
          <div class="rank-name">${u.name||''}</div>
          <div class="rank-course">${u.course?.split('–')[0]?.trim()||''}</div>
          <div>${starsHTML(u.rating||0)}</div>
        </div>
        <div>
          <div class="rank-score">${u.balance||0}h</div>
          <div class="rank-score-lbl">créditos</div>
        </div>
      </div>`).join('')}</div>`
    : `<div class="empty-state"><p class="empty-title">Nenhum usuário ainda</p></div>`
</script>
</body>
</html>
